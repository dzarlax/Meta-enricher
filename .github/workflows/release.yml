name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      HAS_CERT: ${{ secrets.WINDOWS_CERT != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # Download exiftool standalone exe from exiftool.org
      - name: Download exiftool
        shell: pwsh
        run: |
          $ver = (Invoke-WebRequest "https://exiftool.org/ver.txt").Content.Trim()
          Invoke-WebRequest "https://exiftool.org/exiftool-${ver}_64.zip" -OutFile exiftool.zip
          Expand-Archive exiftool.zip -DestinationPath exiftool_tmp
          # 64-bit distribution: exiftool(-k).exe + exiftool_files/ folder (Perl modules)
          $exe = Get-ChildItem exiftool_tmp -Filter "*.exe" -Recurse | Select-Object -First 1
          Copy-Item $exe.FullName Windows/MetaEnricher/exiftool.exe
          $filesDir = Get-ChildItem $exe.Directory -Filter "exiftool_files" -Directory -ErrorAction SilentlyContinue
          if ($filesDir) {
            Copy-Item $filesDir.FullName Windows/MetaEnricher/exiftool_files -Recurse -Force
          }
          Remove-Item exiftool.zip, exiftool_tmp -Recurse -Force

      # ── Portable build ────────────────────────────────────────────────────────
      - name: Build Portable (x64)
        shell: pwsh
        run: |
          dotnet publish Windows/MetaEnricher/MetaEnricher.csproj `
            -c Release -r win-x64 --self-contained `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -p:GenerateAppxPackageOnBuild=false `
            -p:PublishDir=publish-portable

      - name: Zip Portable
        shell: pwsh
        run: |
          Compress-Archive `
            -Path Windows/MetaEnricher/publish-portable/* `
            -DestinationPath MetaEnricher-${{ github.ref_name }}-portable-x64.zip

      # ── MSIX build ────────────────────────────────────────────────────────────
      - name: Build Release (for MSIX)
        shell: pwsh
        run: |
          msbuild Windows/MetaEnricher/MetaEnricher.csproj `
            -p:Configuration=Release `
            -p:Platform=x64 `
            -p:WindowsAppSDKSelfContained=false

      - name: Create MSIX
        shell: pwsh
        run: |
          $out = "Windows/MetaEnricher/bin/x64/Release/net9.0-windows10.0.22621.0"
          $makeappx = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" `
            -Recurse -Filter makeappx.exe |
            Where-Object { $_.FullName -like "*x64*" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          Copy-Item Windows/MetaEnricher/Package.appxmanifest "$out/AppxManifest.xml" -Force
          & $makeappx pack /d $out /p "MetaEnricher-${{ github.ref_name }}-x64.msix" /nv

      # Sign MSIX — only runs if WINDOWS_CERT secret is set.
      # To set up: generate a self-signed cert, export as base64 pfx, add to repo secrets:
      #   WINDOWS_CERT  — base64-encoded .pfx file
      #   WINDOWS_CERT_PASSWORD — pfx password
      - name: Sign MSIX
        if: env.HAS_CERT == 'true'
        shell: pwsh
        run: |
          $pfx = "$env:TEMP\sign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String("${{ secrets.WINDOWS_CERT }}"))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" `
            -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -like "*x64*" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          & $signtool sign /fd SHA256 /p "${{ secrets.WINDOWS_CERT_PASSWORD }}" /f $pfx `
            "MetaEnricher-${{ github.ref_name }}-x64.msix"

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            MetaEnricher-${{ github.ref_name }}-portable-x64.zip
            MetaEnricher-${{ github.ref_name }}-x64.msix
